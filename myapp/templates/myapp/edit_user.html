<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .form-box {
            max-width: 420px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .back-link {
            margin-left: 12px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 9px 14px;
            color: inherit;
        }
    </style>
</head>
<body>
    <h2>Edit User</h2>

    <div class="form-box">
        <form method="POST" action="">
            {% csrf_token %}

            <label>Username:</label>
            <input type="text" name="name" value="{{ user.name }}" required>

            <label>Email:</label>
            <input type="email" name="email" value="{{ user.email }}" required>

            <label>Password (leave blank to keep current):</label>
            <input type="password" name="password" placeholder="New password">

            <button type="submit">Update</button>
            <a href="{% url 'users_list' %}" class="back-link">Back</a>
        </form>
    </div>
</body>
</html>
